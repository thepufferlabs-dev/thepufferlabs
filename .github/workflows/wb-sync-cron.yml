name: World Bank Data Sync

on:
  schedule:
    # Daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      countries:
        description: "Comma-separated country codes (e.g. IND,USA,CHN,GBR)"
        required: false
        default: "IND,USA,CHN,GBR"
      indicators:
        description: "Comma-separated indicator codes"
        required: false
        default: "NY.GDP.MKTP.CD,NY.GDP.PCAP.CD,SP.POP.TOTL"

jobs:
  sync:
    name: Sync World Bank Indicators
    runs-on: ubuntu-latest
    steps:
      - name: Build request body
        run: |
          COUNTRIES="${{ github.event.inputs.countries || 'IND,USA,CHN,GBR' }}"
          INDICATORS="${{ github.event.inputs.indicators || 'NY.GDP.MKTP.CD,NY.GDP.PCAP.CD,SP.POP.TOTL' }}"

          # Convert comma-separated to JSON arrays and write to file
          COUNTRIES_JSON=$(echo "$COUNTRIES" | jq -R 'split(",")')
          INDICATORS_JSON=$(echo "$INDICATORS" | jq -R 'split(",")')

          jq -n \
            --argjson countries "$COUNTRIES_JSON" \
            --argjson indicators "$INDICATORS_JSON" \
            '{countries: $countries, indicators: $indicators}' > /tmp/wb-sync-body.json

          echo "Request body:"
          cat /tmp/wb-sync-body.json

      - name: Trigger wb-sync Edge Function
        run: |
          HTTP_CODE=$(curl -s -o /tmp/wb-sync-response.json -w "%{http_code}" \
            -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/wb-sync" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/wb-sync-body.json)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response:"
          cat /tmp/wb-sync-response.json

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Sync failed with HTTP $HTTP_CODE"
            cat /tmp/wb-sync-response.json
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          RESPONSE=$(cat /tmp/wb-sync-response.json 2>/dev/null || echo "No response")
          echo "## World Bank Data Sync" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo '- **Response:**' >> $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$RESPONSE" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
