name: Supabase Clean DB

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DELETE ALL DATA" to confirm'
        required: true
        type: string
      scope:
        description: 'What to clean'
        required: true
        type: choice
        options:
          - data-only
          - full-schema-and-data
        default: data-only

jobs:
  clean:
    name: Clean DB
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'DELETE ALL DATA'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # Storage must be emptied FIRST via REST API (Supabase blocks direct SQL deletes)
      - name: Empty storage buckets
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          BASE="https://${SUPABASE_PROJECT_REF}.supabase.co/storage/v1"
          for bucket in avatars free-content premium-content course-assets; do
            # Empty the bucket
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "${BASE}/bucket/${bucket}/empty" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json")
            if [ "$code" = "200" ]; then
              echo "✅  Emptied bucket: $bucket"
            else
              echo "⏭️  Bucket $bucket: HTTP $code (may not exist)"
            fi
          done

      - name: Delete storage buckets (full clean only)
        if: inputs.scope == 'full-schema-and-data'
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          BASE="https://${SUPABASE_PROJECT_REF}.supabase.co/storage/v1"
          for bucket in free-content premium-content course-assets; do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -X DELETE "${BASE}/bucket/${bucket}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}")
            if [ "$code" = "200" ]; then
              echo "✅  Deleted bucket: $bucket"
            else
              echo "⏭️  Bucket $bucket delete: HTTP $code"
            fi
          done

      - name: Clean — full schema + data (drop all tables)
        if: inputs.scope == 'full-schema-and-data'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "⚠️  Dropping ALL product/entitlement tables and data..."
          supabase db query --linked --file supabase/migrations/20260405_000_cleanup.sql
          echo "✅  Product schema cleaned"

      - name: Clean — data only (truncate all tables)
        if: inputs.scope == 'data-only'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase db query --linked <<'SQL'
          DO $$
          BEGIN
            -- Truncate product/commerce tables (skip if they don't exist)
            IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'user_entitlements') THEN
              TRUNCATE public.user_entitlements CASCADE;
            END IF;
            IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'subscriptions') THEN
              TRUNCATE public.subscriptions CASCADE;
            END IF;
            IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'orders') THEN
              TRUNCATE public.orders CASCADE;
            END IF;
            IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'coupons') THEN
              TRUNCATE public.coupons CASCADE;
            END IF;
            IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'bundle_products') THEN
              TRUNCATE public.bundle_products CASCADE;
            END IF;
            IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'bundles') THEN
              TRUNCATE public.bundles CASCADE;
            END IF;
            IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'plan_products') THEN
              TRUNCATE public.plan_products CASCADE;
            END IF;
            IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'plans') THEN
              TRUNCATE public.plans CASCADE;
            END IF;
            IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'product_content') THEN
              TRUNCATE public.product_content CASCADE;
            END IF;
            IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'products') THEN
              TRUNCATE public.products CASCADE;
            END IF;

            -- Truncate user tables
            IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'audit_log') THEN
              TRUNCATE public.audit_log CASCADE;
            END IF;
            IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'purchases') THEN
              TRUNCATE public.purchases CASCADE;
            END IF;
            IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'user_identities') THEN
              TRUNCATE public.user_identities CASCADE;
            END IF;
            IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'profiles') THEN
              TRUNCATE public.profiles CASCADE;
            END IF;
            IF EXISTS (SELECT 1 FROM information_schema.tables WHERE table_name = 'schema_migrations') THEN
              TRUNCATE public.schema_migrations CASCADE;
            END IF;
          END $$;

          -- Delete auth users
          DELETE FROM auth.users;
          SQL

          echo "✅  All data truncated"

      - name: Summary
        run: |
          echo "## Database Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Scope | \`${{ inputs.scope }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Storage | Emptied |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Complete |" >> $GITHUB_STEP_SUMMARY

  rejected:
    name: Confirmation Failed
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm != 'DELETE ALL DATA'
    steps:
      - name: Abort
        run: |
          echo "Confirmation text did not match. No data was deleted."
          echo "You must type exactly: DELETE ALL DATA"
          exit 1
