name: World Bank Full Crawl

on:
  workflow_dispatch:
    inputs:
      start_batch:
        description: "Start from batch number (for resuming)"
        default: "1"
  schedule:
    # Weekly full crawl on Sundays at 03:00 UTC
    - cron: "0 3 * * 0"

jobs:
  crawl:
    name: Crawl All Countries
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Run batched crawl
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          START_BATCH: ${{ github.event.inputs.start_batch || '1' }}
        run: |
          set +e

          # ─── 2 indicator groups (10 each) to keep payload small ───
          IND_GROUP_A="NY.GDP.MKTP.CD,NY.GDP.MKTP.KD.ZG,NY.GDP.PCAP.CD,NY.GDP.PCAP.KD.ZG,FP.CPI.TOTL.ZG,NE.TRD.GNFS.ZS,BX.KLT.DINV.CD.WD,SL.UEM.TOTL.ZS,SL.TLF.CACT.ZS,SP.POP.TOTL"
          IND_GROUP_B="SP.POP.GROW,SP.URB.TOTL.IN.ZS,SP.DYN.LE00.IN,SH.XPD.CHEX.GD.ZS,SE.ADT.LITR.ZS,SE.XPD.TOTL.GD.ZS,EG.USE.ELEC.KH.PC,IT.NET.USER.ZS,EN.ATM.CO2E.PC,NY.GNP.PCAP.CD"

          # ─── All ~215 country ISO3 codes (2 per batch) ───────────
          # East Asia & Pacific
          EAP=(ASM AUS BRN CHN FJI FSM GUM HKG IDN JPN KHM KIR KOR LAO MAC MHL MMR MNG MNP MYS NCL NRU NZL PHL PLW PNG PRK PYF SGP SLB SYC THA TKL TLS TON TUV TWN VNM VUT WSM)
          # Europe & Central Asia
          ECA=(ALB AND ARM AUT AZE BEL BGR BIH BLR CHE CYP CZE DEU DNK ESP EST FIN FRA FRO GBR GEO GRC GRL HRV HUN IMN IRL ISL ITA KAZ KGZ LIE LTU LUX LVA MDA MKD MNE NLD NOR POL PRT ROU RUS SMR SRB SVK SVN SWE TJK TKM TUR UKR UZB XKX)
          # Latin America & Caribbean
          LAC=(ABW ARG ATG BHS BLZ BOL BRA BRB CHL COL CRI CUB CUW CYM DMA DOM ECU GRD GTM GUY HND HTI JAM KNA LCA MEX NIC PAN PER PRI PRY SLV SUR SXM TCA TTO URY VCT VEN VGB VIR)
          # Middle East & North Africa
          MNA=(ARE BHR DJI DZA EGY IRN IRQ ISR JOR KWT LBN LBY MAR MLT OMN PSE QAT SAU SYR TUN YEM)
          # North America
          NAC=(BMU CAN USA)
          # South Asia
          SAR=(AFG BGD BTN IND LKA MDV NPL PAK)
          # Sub-Saharan Africa
          SSA=(AGO BDI BEN BFA BWA CAF CIV CMR COD COG COM CPV ERI ETH GAB GHA GIN GMB GNB GNQ KEN LBR LSO MDG MLI MOZ MRT MUS MWI NAM NER NGA RWA SDN SEN SLE SOM SSD STP SWZ TCD TGO TZA UGA ZAF ZMB ZWE)

          ALL_COUNTRIES=("${EAP[@]}" "${ECA[@]}" "${LAC[@]}" "${MNA[@]}" "${NAC[@]}" "${SAR[@]}" "${SSA[@]}")

          COUNTRIES_PER_BATCH=2
          TOTAL=${#ALL_COUNTRIES[@]}
          TOTAL_BATCHES=$(( (TOTAL + COUNTRIES_PER_BATCH - 1) / COUNTRIES_PER_BATCH ))

          echo "Total countries: $TOTAL"
          echo "Countries per batch: $COUNTRIES_PER_BATCH"
          echo "Indicator groups: 2 (10 each)"
          echo "Total batches: $TOTAL_BATCHES (x2 indicator groups = $((TOTAL_BATCHES * 2)) API calls)"
          echo "Starting from batch: $START_BATCH"
          echo ""

          SUCCESS_COUNT=0
          FAIL_COUNT=0
          SKIP_COUNT=0
          TOTAL_ROWS=0

          echo "## World Bank Full Crawl" > /tmp/crawl-summary.md
          echo "" >> /tmp/crawl-summary.md
          echo "| Batch | Countries | Group | HTTP | Rows | Status |" >> /tmp/crawl-summary.md
          echo "|-------|-----------|-------|------|------|--------|" >> /tmp/crawl-summary.md

          call_sync() {
            local COUNTRY_CSV="$1"
            local INDICATOR_CSV="$2"
            local LABEL="$3"
            local GROUP_LABEL="$4"

            COUNTRIES_JSON=$(echo "$COUNTRY_CSV" | jq -R 'split(",")')
            INDICATORS_JSON=$(echo "$INDICATOR_CSV" | jq -R 'split(",")')

            jq -n \
              --argjson countries "$COUNTRIES_JSON" \
              --argjson indicators "$INDICATORS_JSON" \
              --argjson skip_overlap_check true \
              '{countries: $countries, indicators: $indicators, skip_overlap_check: $skip_overlap_check}' \
              > /tmp/wb-batch-body.json

            HTTP_CODE=$(curl -s -o /tmp/wb-batch-response.json -w "%{http_code}" \
              --max-time 120 \
              -X POST \
              "${SUPABASE_URL}/functions/v1/wb-sync" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d @/tmp/wb-batch-body.json)

            RESPONSE=$(cat /tmp/wb-batch-response.json 2>/dev/null || echo "{}")
            ROWS=$(echo "$RESPONSE" | jq -r '.rows_inserted // 0' 2>/dev/null || echo "0")

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "  $GROUP_LABEL: $HTTP_CODE OK ($ROWS rows)"
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              TOTAL_ROWS=$((TOTAL_ROWS + ROWS))
              echo "| $LABEL | $COUNTRY_CSV | $GROUP_LABEL | $HTTP_CODE | $ROWS | OK |" >> /tmp/crawl-summary.md
            else
              echo "  $GROUP_LABEL: HTTP $HTTP_CODE FAILED"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              echo "| $LABEL | $COUNTRY_CSV | $GROUP_LABEL | $HTTP_CODE | - | FAILED |" >> /tmp/crawl-summary.md
            fi
          }

          for (( batch=1; batch<=TOTAL_BATCHES; batch++ )); do
            if [ "$batch" -lt "$START_BATCH" ]; then
              SKIP_COUNT=$((SKIP_COUNT + 1))
              continue
            fi

            START_IDX=$(( (batch - 1) * COUNTRIES_PER_BATCH ))
            BATCH_COUNTRIES=("${ALL_COUNTRIES[@]:$START_IDX:$COUNTRIES_PER_BATCH}")
            COUNTRY_CSV=$(IFS=,; echo "${BATCH_COUNTRIES[*]}")

            echo "━━━ Batch $batch/$TOTAL_BATCHES: $COUNTRY_CSV ━━━"

            # Group A: economy, trade, employment, population
            call_sync "$COUNTRY_CSV" "$IND_GROUP_A" "$batch/$TOTAL_BATCHES" "A"
            sleep 3

            # Group B: health, education, infra, climate
            call_sync "$COUNTRY_CSV" "$IND_GROUP_B" "$batch/$TOTAL_BATCHES" "B"

            # Pause between country batches
            if [ "$batch" -lt "$TOTAL_BATCHES" ]; then
              sleep 3
            fi
          done

          echo ""
          echo "============================================"
          echo "CRAWL COMPLETE"
          echo "  Successful calls: $SUCCESS_COUNT"
          echo "  Failed calls:     $FAIL_COUNT"
          echo "  Skipped batches:  $SKIP_COUNT"
          echo "  Total rows:       $TOTAL_ROWS"
          echo "============================================"

          echo "" >> /tmp/crawl-summary.md
          echo "### Summary" >> /tmp/crawl-summary.md
          echo "- **Successful:** $SUCCESS_COUNT / $((TOTAL_BATCHES * 2))" >> /tmp/crawl-summary.md
          echo "- **Failed:** $FAIL_COUNT" >> /tmp/crawl-summary.md
          echo "- **Total rows upserted:** $TOTAL_ROWS" >> /tmp/crawl-summary.md
          echo "- **Completed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> /tmp/crawl-summary.md

          cat /tmp/crawl-summary.md >> "$GITHUB_STEP_SUMMARY"

          if [ "$SUCCESS_COUNT" -eq 0 ] && [ "$FAIL_COUNT" -gt 0 ]; then
            echo "::error::All calls failed"
            exit 1
          fi
