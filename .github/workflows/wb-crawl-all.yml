name: World Bank Full Crawl

on:
  workflow_dispatch:
    inputs:
      start_from:
        description: "Start from country number (for resuming)"
        default: "1"
  schedule:
    - cron: "0 3 * * 0"

jobs:
  crawl:
    name: Crawl All Countries
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Crawl
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          START: ${{ github.event.inputs.start_from || '1' }}
        run: |
          set +e

          ALL_IND="NY.GDP.MKTP.CD,NY.GDP.MKTP.KD.ZG,NY.GDP.PCAP.CD,NY.GDP.PCAP.KD.ZG,FP.CPI.TOTL.ZG,NE.TRD.GNFS.ZS,BX.KLT.DINV.CD.WD,SL.UEM.TOTL.ZS,SL.TLF.CACT.ZS,SP.POP.TOTL,SP.POP.GROW,SP.URB.TOTL.IN.ZS,SP.DYN.LE00.IN,SH.XPD.CHEX.GD.ZS,SE.ADT.LITR.ZS,SE.XPD.TOTL.GD.ZS,EG.USE.ELEC.KH.PC,IT.NET.USER.ZS,EN.ATM.CO2E.PC,NY.GNP.PCAP.CD"
          IND_JSON=$(echo "$ALL_IND" | jq -R 'split(",")')

          C=(
            ASM AUS BRN CHN FJI FSM GUM HKG IDN JPN KHM KIR KOR LAO MAC
            MHL MMR MNG MNP MYS NCL NRU NZL PHL PLW PNG PRK PYF SGP SLB
            SYC THA TKL TLS TON TUV TWN VNM VUT WSM
            ALB AND ARM AUT AZE BEL BGR BIH BLR CHE CYP CZE DEU DNK ESP
            EST FIN FRA FRO GBR GEO GRC GRL HRV HUN IMN IRL ISL ITA KAZ
            KGZ LIE LTU LUX LVA MDA MKD MNE NLD NOR POL PRT ROU RUS SMR
            SRB SVK SVN SWE TJK TKM TUR UKR UZB XKX
            ABW ARG ATG BHS BLZ BOL BRA BRB CHL COL CRI CUB CUW CYM DMA
            DOM ECU GRD GTM GUY HND HTI JAM KNA LCA MEX NIC PAN PER PRI
            PRY SLV SUR SXM TCA TTO URY VCT VEN VGB VIR
            ARE BHR DJI DZA EGY IRN IRQ ISR JOR KWT LBN LBY MAR MLT OMN
            PSE QAT SAU SYR TUN YEM
            BMU CAN USA
            AFG BGD BTN IND LKA MDV NPL PAK
            AGO BDI BEN BFA BWA CAF CIV CMR COD COG COM CPV ERI ETH GAB
            GHA GIN GMB GNB GNQ KEN LBR LSO MDG MLI MOZ MRT MUS MWI NAM
            NER NGA RWA SDN SEN SLE SOM SSD STP SWZ TCD TGO TZA UGA ZAF
            ZMB ZWE
          )

          T=${#C[@]}
          OK=0; FAIL=0; ROWS=0; FAILS=""

          REFRESH_EVERY=20  # Refresh views every 20 countries

          echo "Countries: $T | Indicators: 20 | 1 call per country"
          echo "Refresh views every: $REFRESH_EVERY countries"
          echo "Starting from: $START"
          echo ""

          refresh_views() {
            echo "  >> Refreshing materialized views..."
            curl -s -o /dev/null -w "" --max-time 30 \
              -X POST "${SUPABASE_URL}/rest/v1/rpc/refresh_wb_materialized_views" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" -d '{}'
            echo "  >> Views refreshed"
          }

          echo "## Crawl Results" > /tmp/s.md
          echo "| # | CC | HTTP | Rows |" >> /tmp/s.md
          echo "|---|-----|------|------|" >> /tmp/s.md

          for (( i=0; i<T; i++ )); do
            N=$((i+1))
            [ "$N" -lt "$START" ] && continue

            jq -n --arg c "${C[$i]}" --argjson ind "$IND_JSON" \
              '{countries:[$c],indicators:$ind,skip_overlap_check:true}' > /tmp/b.json

            CODE=$(curl -s -o /tmp/r.json -w "%{http_code}" --max-time 50 \
              -X POST "${SUPABASE_URL}/functions/v1/wb-sync" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" -d @/tmp/b.json)

            R=$(jq -r '.rows_inserted//0' /tmp/r.json 2>/dev/null || echo 0)

            if [ "$CODE" -ge 200 ] 2>/dev/null && [ "$CODE" -lt 300 ] 2>/dev/null; then
              printf "%3d. %-3s %s (%s)\n" "$N" "${C[$i]}" "$CODE" "$R"
              OK=$((OK+1)); ROWS=$((ROWS+R))
              echo "| $N | ${C[$i]} | $CODE | $R |" >> /tmp/s.md
            else
              printf "%3d. %-3s FAIL %s\n" "$N" "${C[$i]}" "$CODE"
              FAIL=$((FAIL+1)); FAILS="$FAILS ${C[$i]}"
              echo "| $N | ${C[$i]} | $CODE | FAIL |" >> /tmp/s.md
            fi

            # Refresh views periodically so analytics page updates incrementally
            if [ $((N % REFRESH_EVERY)) -eq 0 ]; then
              refresh_views
            fi
          done

          # Final refresh after all countries
          refresh_views

          echo ""
          echo "=== DONE ok=$OK fail=$FAIL rows=$ROWS ==="
          [ -n "$FAILS" ] && echo "Failed:$FAILS"

          echo "" >> /tmp/s.md
          echo "**OK:** $OK | **Fail:** $FAIL | **Rows:** $ROWS" >> /tmp/s.md
          [ -n "$FAILS" ] && echo "**Retry:**$FAILS" >> /tmp/s.md
          cat /tmp/s.md >> "$GITHUB_STEP_SUMMARY"

          [ "$OK" -eq 0 ] && [ "$FAIL" -gt 0 ] && exit 1 || true
