<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Pufferfish body (inflated round shape) -->
  <ellipse cx="256" cy="270" rx="160" ry="150" fill="#0f172a" stroke="#38bdf8" stroke-width="4"/>

  <!-- Spines around the body -->
  <g stroke="#38bdf8" stroke-width="3" stroke-linecap="round">
    <!-- Top spines -->
    <line x1="256" y1="120" x2="256" y2="88"/>
    <line x1="220" y1="126" x2="210" y2="96"/>
    <line x1="292" y1="126" x2="302" y2="96"/>
    <line x1="186" y1="140" x2="166" y2="114"/>
    <line x1="326" y1="140" x2="346" y2="114"/>
    <!-- Upper-side spines -->
    <line x1="152" y1="168" x2="124" y2="148"/>
    <line x1="360" y1="168" x2="388" y2="148"/>
    <!-- Side spines -->
    <line x1="108" y1="220" x2="76" y2="212"/>
    <line x1="404" y1="220" x2="436" y2="212"/>
    <line x1="100" y1="270" x2="66" y2="270"/>
    <line x1="412" y1="270" x2="446" y2="270"/>
    <line x1="108" y1="320" x2="76" y2="328"/>
    <line x1="404" y1="320" x2="436" y2="328"/>
    <!-- Lower-side spines -->
    <line x1="130" y1="360" x2="106" y2="382"/>
    <line x1="382" y1="360" x2="406" y2="382"/>
    <!-- Bottom spines -->
    <line x1="170" y1="396" x2="154" y2="422"/>
    <line x1="342" y1="396" x2="358" y2="422"/>
    <line x1="220" y1="412" x2="214" y2="440"/>
    <line x1="292" y1="412" x2="298" y2="440"/>
  </g>

  <!-- Belly (lighter area) -->
  <ellipse cx="256" cy="310" rx="100" ry="80" fill="#1e293b" opacity="0.6"/>

  <!-- Left eye -->
  <circle cx="210" cy="240" r="28" fill="#f8fafc"/>
  <circle cx="216" cy="238" r="14" fill="#0f172a"/>
  <circle cx="220" cy="234" r="5" fill="#f8fafc"/>

  <!-- Right eye -->
  <circle cx="302" cy="240" r="28" fill="#f8fafc"/>
  <circle cx="308" cy="238" r="14" fill="#0f172a"/>
  <circle cx="312" cy="234" r="5" fill="#f8fafc"/>

  <!-- Mouth (small surprised "o") -->
  <ellipse cx="256" cy="300" rx="12" ry="10" fill="#0ea5e9" opacity="0.7"/>

  <!-- Tail fin -->
  <path d="M400 270 Q440 240 430 200 Q420 240 400 250 Z" fill="#0ea5e9" opacity="0.8"/>
  <path d="M400 270 Q440 300 430 340 Q420 300 400 290 Z" fill="#0ea5e9" opacity="0.8"/>

  <!-- Top fin -->
  <path d="M240 125 Q256 70 272 125 Q256 110 240 125 Z" fill="#0ea5e9" opacity="0.7"/>

  <!-- Pectoral fins (small side fins) -->
  <path d="M120 260 Q90 240 85 270 Q100 260 120 275 Z" fill="#0ea5e9" opacity="0.6"/>
  <path d="M120 280 Q90 300 85 270 Q100 280 120 275 Z" fill="#0ea5e9" opacity="0.6"/>
</svg>
